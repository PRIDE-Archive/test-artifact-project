name: Java 21 Build and Artifact

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'        # Changed to 21
          distribution: 'temurin'   # Reliable OpenJDK distribution

      - name: Build with Maven
        run: mvn -B package

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: testartifact
          path: target/*.jar
          retention-days: 5
